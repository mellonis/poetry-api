name: Deploy

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
    types: [ opened, synchronize, reopened, closed ]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test

  check-paths:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      deployable: ${{ steps.filter.outputs.deployable }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            deployable:
              - 'src/**'
              - 'Dockerfile'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'eslint.config.js'

  build-and-deploy:
    needs: [ ci, check-paths ]
    if: |
      always() &&
      needs.ci.result == 'success' &&
      (github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
      !contains(github.event.pull_request.labels.*.name, 'skip-deploy') &&
      needs.check-paths.outputs.deployable == 'true'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}
      - name: Deploy on VPS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
        run: |
          ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST \
            "IMAGE=$IMAGE /var/web-apps/run.sh poetry-api"
